<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>💰 Budget Tracker</h1>
        
        <div class="summary">
            <div class="summary-card">
                <h3>Total Balance</h3>
                <p id="balance">$0.00</p>
            </div>
            <div class="summary-card income">
                <h3>Income</h3>
                <p id="incomeTotal">$0.00</p>
            </div>
            <div class="summary-card expense">
                <h3>Expenses</h3>
                <p id="expenseTotal">$0.00</p>
            </div>
        </div>

        <div class="add-transaction">
            <h2>Add New Transaction</h2>
            <form id="transactionForm">
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" placeholder="e.g., Groceries, Salary" required>
                </div>
                <div class="form-group">
                    <label for="amount">Amount</label>
                    <input type="number" id="amount" placeholder="Enter amount" step="0.01" min="0.01" required>
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="type" value="income" checked> Income
                        </label>
                        <label>
                            <input type="radio" name="type" value="expense"> Expense
                        </label>
                    </div>
                </div>
                <button type="submit">Add Transaction</button>
            </form>
        </div>

        <div class="history">
            <h2>Transaction History</h2>
            <ul id="transactionList" class="transaction-list"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
